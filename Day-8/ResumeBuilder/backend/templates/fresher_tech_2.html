<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{NAME}} — Resume</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Space Grotesk', sans-serif; background: #fff; color: #0a0a0a; font-size: 13px; }
  .resume { width: 794px; min-height: 1123px; }
  .header { background: linear-gradient(135deg, #1a0533 0%, #7c3aed 50%, #c026d3 100%); color: #fff; padding: 40px 48px; position: relative; overflow: hidden; }
  .header::before { content: ''; position: absolute; right: -40px; top: -40px; width: 200px; height: 200px; border-radius: 50%; background: rgba(255,255,255,0.05); }
  .header::after { content: ''; position: absolute; right: 60px; bottom: -60px; width: 150px; height: 150px; border-radius: 50%; background: rgba(255,255,255,0.04); }
  .h-name { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
  .h-role { font-size: 14px; color: rgba(255,255,255,0.75); margin-top: 6px; font-weight: 300; }
  .h-contacts { display: flex; gap: 24px; margin-top: 16px; flex-wrap: wrap; }
  .h-contact { font-size: 11px; color: rgba(255,255,255,0.8); }
  .body { display: grid; grid-template-columns: 1fr 280px; gap: 0; }
  .main { padding: 32px 36px; display: flex; flex-direction: column; gap: 24px; }
  .aside { background: #f8f4ff; padding: 32px 24px; display: flex; flex-direction: column; gap: 22px; }
  .section-title { font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: #7c3aed; margin-bottom: 12px; }
  .summary-text { font-size: 12px; color: #4b5563; line-height: 1.75; }
  .exp-item { border-left: 3px solid #7c3aed; padding-left: 14px; margin-bottom: 16px; }
  .exp-header strong { font-size: 13px; font-weight: 600; color: #0a0a0a; display: block; }
  .exp-company { font-size: 11px; color: #7c3aed; font-weight: 600; }
  .exp-duration { font-size: 10px; color: #9ca3af; float: right; }
  .exp-desc { font-size: 11px; color: #6b7280; margin-top: 5px; line-height: 1.6; }
  .skill-tag { display: inline-block; background: #7c3aed; color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 10px; margin: 3px 2px; font-weight: 500; }
  .edu-item strong { font-size: 12px; color: #0a0a0a; display: block; }
  .edu-item span { font-size: 11px; color: #6b7280; }
  .bullets-list { padding-left: 16px; }
  .bullets-list li { font-size: 11px; color: #4b5563; margin-bottom: 5px; line-height: 1.5; }
</style>
</head>
<body>
<div class="resume">
  <div class="header">
    <div class="h-name">{{NAME}}</div>
    <div class="h-role">{{TARGET_ROLE}} · {{CAREER}}</div>
    <div class="h-contacts">
      <span class="h-contact">✉ {{EMAIL}}</span>
      <span class="h-contact">📱 {{PHONE}}</span>
      <span class="h-contact">📍 {{LOCATION}}</span>
    </div>
  </div>
  <div class="body">
    <div class="main">
      <div>
        <div class="section-title">About Me</div>
        <p class="summary-text">{{SUMMARY}}</p>
      </div>
      <div>
        <div class="section-title">Experience</div>
        {{EXPERIENCE}}
      </div>
      <div>
        <div class="section-title">Achievements & Highlights</div>
        {{SUGGESTED_BULLETS}}
      </div>
    </div>
    <div class="aside">
      <div>
        <div class="section-title">Education</div>
        {{EDUCATION}}
      </div>
      <div>
        <div class="section-title">Tech Stack</div>
        {{SKILLS}}
      </div>
    </div>
  </div>
</div>
</body>
</html>
