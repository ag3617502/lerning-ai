<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{NAME}} — Resume</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Poppins', sans-serif; background: #fff; color: #1a1a1a; font-size: 12px; }
  .resume { width: 794px; min-height: 1123px; display: grid; grid-template-columns: 220px 1fr; }
  .sidebar { background: linear-gradient(180deg, #064e3b 0%, #059669 60%, #10b981 100%); color: #fff; padding: 36px 20px; display: flex; flex-direction: column; gap: 24px; }
  .avatar-ring { width: 72px; height: 72px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; margin: 0 auto; }
  .s-name { text-align: center; font-size: 14px; font-weight: 600; margin-top: 8px; }
  .s-role { text-align: center; font-size: 10px; color: rgba(255,255,255,0.7); margin-top: 3px; }
  .s-section { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #a7f3d0; margin-bottom: 10px; }
  .s-divider { height: 1px; background: rgba(255,255,255,0.15); }
  .contact-item { font-size: 10px; color: rgba(255,255,255,0.85); margin-bottom: 7px; display: flex; gap: 6px; align-items: center; }
  .skill-tag { display: inline-block; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: #fff; padding: 3px 9px; border-radius: 20px; font-size: 9px; margin: 3px 2px; font-weight: 500; }
  .main { padding: 32px 36px; display: flex; flex-direction: column; gap: 22px; }
  .section-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #059669; border-bottom: 1.5px solid #d1fae5; padding-bottom: 5px; margin-bottom: 12px; }
  .summary-text { font-size: 11.5px; color: #4b5563; line-height: 1.7; }
  .exp-item { margin-bottom: 14px; }
  .exp-header strong { font-size: 12px; font-weight: 600; display: block; }
  .exp-company { font-size: 10.5px; color: #059669; font-weight: 600; }
  .exp-duration { font-size: 10px; color: #9ca3af; float: right; }
  .exp-desc { font-size: 11px; color: #6b7280; margin-top: 4px; line-height: 1.5; }
  .edu-item { margin-bottom: 10px; }
  .edu-item strong { font-size: 12px; display: block; }
  .edu-item span { font-size: 10.5px; color: #6b7280; }
  .bullets-list { padding-left: 14px; }
  .bullets-list li { font-size: 11px; color: #475569; margin-bottom: 5px; line-height: 1.5; }
</style>
</head>
<body>
<div class="resume">
  <div class="sidebar">
    <div>
      <div class="avatar-ring">{{NAME}}</div>
      <div class="s-name">{{NAME}}</div>
      <div class="s-role">{{TARGET_ROLE}}</div>
    </div>
    <div class="s-divider"></div>
    <div>
      <div class="s-section">Contact</div>
      <div class="contact-item">✉ {{EMAIL}}</div>
      <div class="contact-item">📱 {{PHONE}}</div>
      <div class="contact-item">📍 {{LOCATION}}</div>
    </div>
    <div class="s-divider"></div>
    <div>
      <div class="s-section">Skills</div>
      {{SKILLS}}
    </div>
  </div>
  <div class="main">
    <div>
      <div class="section-title">Professional Objective</div>
      <p class="summary-text">{{SUMMARY}}</p>
    </div>
    <div>
      <div class="section-title">Education</div>
      {{EDUCATION}}
    </div>
    <div>
      <div class="section-title">Projects / Internships</div>
      {{EXPERIENCE}}
    </div>
    <div>
      <div class="section-title">Achievements</div>
      {{SUGGESTED_BULLETS}}
    </div>
  </div>
</div>
</body>
</html>
