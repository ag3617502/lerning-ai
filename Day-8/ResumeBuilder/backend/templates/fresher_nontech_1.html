<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{NAME}} — Resume</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #fffdf9; color: #2c2c2c; font-size: 13px; }
  .resume { width: 794px; min-height: 1123px; }
  .header { border-top: 6px solid #f59e0b; padding: 36px 48px 28px; display: flex; justify-content: space-between; align-items: flex-end; }
  .h-left .h-name { font-family: 'Lora', serif; font-size: 30px; font-weight: 700; color: #1c1c1c; }
  .h-left .h-role { font-size: 13px; color: #f59e0b; font-weight: 500; margin-top: 4px; letter-spacing: 1px; }
  .h-right { text-align: right; }
  .h-contact { font-size: 11px; color: #6b6b6b; margin-bottom: 4px; }
  .divider { height: 2px; background: linear-gradient(to right, #f59e0b, #fcd34d, transparent); margin: 0 48px; }
  .body { padding: 28px 48px; display: flex; flex-direction: column; gap: 22px; }
  .section-title { font-family: 'Lora', serif; font-size: 14px; font-weight: 700; color: #1c1c1c; border-bottom: 1px solid #fde68a; padding-bottom: 5px; margin-bottom: 12px; }
  .summary-text { font-size: 12px; color: #555; line-height: 1.75; }
  .exp-item { margin-bottom: 14px; }
  .exp-header { display: flex; justify-content: space-between; margin-bottom: 3px; }
  .exp-header strong { font-size: 13px; font-weight: 600; }
  .exp-company { font-size: 11px; color: #f59e0b; font-weight: 600; }
  .exp-duration { font-size: 10px; color: #9ca3af; }
  .exp-desc { font-size: 11px; color: #666; line-height: 1.6; margin-top: 4px; }
  .skill-tag { display: inline-block; background: #fef3c7; border: 1px solid #fde68a; color: #92400e; padding: 3px 10px; border-radius: 3px; font-size: 10px; margin: 3px 2px; font-weight: 500; }
  .edu-item { margin-bottom: 10px; }
  .edu-item strong { font-size: 12px; display: block; }
  .edu-item span { font-size: 11px; color: #777; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .bullets-list { padding-left: 16px; }
  .bullets-list li { font-size: 11px; color: #555; margin-bottom: 5px; line-height: 1.5; }
</style>
</head>
<body>
<div class="resume">
  <div class="header">
    <div class="h-left">
      <div class="h-name">{{NAME}}</div>
      <div class="h-role">{{TARGET_ROLE}}</div>
    </div>
    <div class="h-right">
      <div class="h-contact">{{EMAIL}}</div>
      <div class="h-contact">{{PHONE}}</div>
      <div class="h-contact">{{LOCATION}}</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="body">
    <div>
      <div class="section-title">Objective</div>
      <p class="summary-text">{{SUMMARY}}</p>
    </div>
    <div class="two-col">
      <div>
        <div class="section-title">Education</div>
        {{EDUCATION}}
      </div>
      <div>
        <div class="section-title">Core Skills</div>
        {{SKILLS}}
      </div>
    </div>
    <div>
      <div class="section-title">Internships & Projects</div>
      {{EXPERIENCE}}
    </div>
    <div>
      <div class="section-title">Key Strengths</div>
      {{SUGGESTED_BULLETS}}
    </div>
  </div>
</div>
</body>
</html>
